<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نقطة البيع - نظام الصيدليات</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Cairo', sans-serif;
            background: #f5f7fa;
            height: 100vh;
            overflow: hidden;
        }
        .app-container { display: flex; height: 100vh; }
        .sidebar {
            width: 260px;
            background: white;
            box-shadow: 2px 0 10px rgba(0,0,0,0.1);
            height: 100%;
            overflow-y: auto;
        }
        .sidebar-header { padding: 20px; text-align: center; border-bottom: 1px solid #e0e0e0; }
        .sidebar-header i { font-size: 40px; color: #2c7da0; }
        .sidebar-nav a {
            display: flex;
            align-items: center;
            padding: 12px 20px;
            color: #2c3e50;
            text-decoration: none;
        }
        .sidebar-nav a:hover, .sidebar-nav a.active {
            background: linear-gradient(90deg, #2c7da0, #61a5c2);
            color: white;
        }
        .sidebar-nav i { width: 24px; margin-left: 10px; }
        .sidebar-footer {
            padding: 20px;
            border-top: 1px solid #e0e0e0;
            position: absolute;
            bottom: 0;
            width: 260px;
        }
        .logout-btn {
            width: 100%;
            padding: 10px;
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .top-bar {
            background: white;
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .content-wrapper {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }
        .pos-container {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 20px;
            height: 100%;
        }
        /* قسم المنتجات */
        .products-section {
            background: white;
            border-radius: 15px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        .search-bar {
            margin-bottom: 20px;
        }
        .search-input-wrapper {
            display: flex;
            gap: 10px;
        }
        .search-input-wrapper input {
            flex: 1;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            font-family: 'Cairo', sans-serif;
        }
        .search-input-wrapper input:focus {
            outline: none;
            border-color: #2c7da0;
        }
        .search-clear {
            background: #e74c3c;
            color: white;
            border: none;
            width: 40px;
            border-radius: 10px;
            cursor: pointer;
        }
        .search-type {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        .search-type-btn {
            padding: 5px 15px;
            border: 1px solid #ddd;
            background: white;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
        }
        .search-type-btn.active {
            background: #2c7da0;
            color: white;
            border-color: #2c7da0;
        }
        .product-grid {
            flex: 1;
            overflow-y: auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 12px;
        }
        .product-card {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            border: 1px solid #e0e0e0;
            transition: 0.2s;
        }
        .product-card:hover {
            background: #2c7da0;
            color: white;
            transform: translateY(-2px);
        }
        .product-name { font-weight: bold; margin-bottom: 5px; }
        .product-price { color: #2c7da0; font-weight: bold; }
        .product-card:hover .product-price { color: white; }
        .product-stock { font-size: 11px; color: #7f8c8d; margin-top: 5px; }
        /* سلة المشتريات */
        .cart-section {
            background: white;
            border-radius: 15px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        .cart-items {
            flex: 1;
            overflow-y: auto;
            margin: 15px 0;
        }
        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid #e0e0e0;
        }
        .cart-item-info { flex: 1; }
        .cart-item-name { font-weight: bold; }
        .cart-item-price { font-weight: bold; color: #2c7da0; margin: 0 10px; }
        .cart-item-actions button {
            background: none;
            border: none;
            cursor: pointer;
            padding: 5px;
        }
        .cart-total {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            margin-top: 10px;
        }
        .btn-checkout {
            width: 100%;
            padding: 12px;
            background: #27ae60;
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        .empty-cart { text-align: center; padding: 40px; color: #95a5a6; }
        @media (max-width: 768px) {
            .pos-container { grid-template-columns: 1fr; }
            .sidebar { position: fixed; transform: translateX(-100%); }
            .sidebar.active { transform: translateX(0); }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header"><i class="fas fa-hospital-user"></i><h3>نظام الصيدلية</h3></div>
            <nav class="sidebar-nav">
                <a href="dashboard.html"><i class="fas fa-chart-line"></i> لوحة التحكم</a>
                <a href="inventory.html"><i class="fas fa-boxes"></i> المخزون</a>
                <a href="pos.html" class="active"><i class="fas fa-cash-register"></i> نقطة البيع</a>
                <a href="customers.html"><i class="fas fa-users"></i> العملاء</a>
                <a href="invoices.html"><i class="fas fa-file-invoice"></i> الفواتير</a>
                <a href="reports.html"><i class="fas fa-chart-bar"></i> التقارير</a>
                <a href="settings.html"><i class="fas fa-cog"></i> الإعدادات</a>
            </nav>
            <div class="sidebar-footer"><button onclick="logout()" class="logout-btn">تسجيل الخروج</button></div>
        </aside>
        <main class="main-content">
            <header class="top-bar">
                <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
                <div><span id="userName"></span> <i class="fas fa-user-circle"></i></div>
            </header>
            <div class="content-wrapper">
                <div class="pos-container">
                    <div class="products-section">
                        <div class="search-bar">
                            <div class="search-input-wrapper">
                                <input type="text" id="searchInput" placeholder="🔍 بحث بالاسم أو الباركود...">
                                <button class="search-clear" id="clearSearchBtn" style="display: none;">✕</button>
                            </div>
                            <div class="search-type">
                                <button class="search-type-btn active" data-type="all">الكل</button>
                                <button class="search-type-btn" data-type="name">بحث بالاسم</button>
                                <button class="search-type-btn" data-type="barcode">بحث بالباركود</button>
                            </div>
                        </div>
                        <div class="product-grid" id="productGrid"></div>
                    </div>
                    <div class="cart-section">
                        <h3>🛒 سلة المشتريات</h3>
                        <div class="cart-items" id="cartItems"></div>
                        <div class="cart-total" id="cartTotal" style="display: none;">
                            <div><strong>الإجمالي: <span id="cartTotalAmount">0</span> ج.س</strong></div>
                            <button class="btn-checkout" onclick="checkout()">إتمام البيع</button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        let products = [];
        let cart = [];
        let searchTerm = '';
        let searchType = 'all';
        
        function loadProducts() {
            const stored = localStorage.getItem('products');
            if (stored) {
                products = JSON.parse(stored);
            } else {
                products = [
                    { id: 1, name: "باراسيتامول 500mg", barcode: "123456", sellingPrice: 130, quantity: 150 },
                    { id: 2, name: "إيبوبروفين 400mg", barcode: "123457", sellingPrice: 195, quantity: 80 },
                    { id: 3, name: "أموكسيسيلين 500mg", barcode: "123458", sellingPrice: 260, quantity: 45 }
                ];
            }
            displayProducts();
        }
        
        function displayProducts() {
            const grid = document.getElementById('productGrid');
            let filtered = products;
            
            if (searchTerm) {
                if (searchType === 'name') {
                    filtered = products.filter(p => p.name.toLowerCase().includes(searchTerm.toLowerCase()));
                } else if (searchType === 'barcode') {
                    filtered = products.filter(p => p.barcode && p.barcode.toLowerCase().includes(searchTerm.toLowerCase()));
                } else {
                    filtered = products.filter(p => 
                        p.name.toLowerCase().includes(searchTerm.toLowerCase()) ||
                        (p.barcode && p.barcode.toLowerCase().includes(searchTerm.toLowerCase()))
                    );
                }
            }
            
            if (filtered.length === 0) {
                grid.innerHTML = '<div style="text-align:center;padding:40px;">🔍 لا توجد منتجات</div>';
                return;
            }
            
            let html = '';
            filtered.forEach(p => {
                html += `
                    <div class="product-card" onclick="addToCart(${p.id})">
                        <div class="product-name">${p.name}</div>
                        <div class="product-price">${p.sellingPrice} ج.س</div>
                        <div class="product-stock">المتبقي: ${p.quantity}</div>
                        <div style="font-size:10px;">${p.barcode || ''}</div>
                    </div>
                `;
            });
            grid.innerHTML = html;
        }
        
        function addToCart(productId) {
            const product = products.find(p => p.id === productId);
            if (!product) return;
            if (product.quantity <= 0) {
                alert('⚠️ المنتج غير متوفر');
                return;
            }
            const existing = cart.find(item => item.id === productId);
            if (existing) {
                if (existing.quantity + 1 > product.quantity) {
                    alert('⚠️ الكمية غير متوفرة');
                    return;
                }
                existing.quantity++;
            } else {
                cart.push({ ...product, quantity: 1 });
            }
            updateCart();
        }
        
        function updateCart() {
            const cartDiv = document.getElementById('cartItems');
            const totalDiv = document.getElementById('cartTotal');
            
            if (cart.length === 0) {
                cartDiv.innerHTML = '<div class="empty-cart">🛒 السلة فارغة</div>';
                totalDiv.style.display = 'none';
                return;
            }
            
            let total = 0;
            let html = '';
            cart.forEach((item, index) => {
                const itemTotal = item.sellingPrice * item.quantity;
                total += itemTotal;
                html += `
                    <div class="cart-item">
                        <div class="cart-item-info">
                            <div class="cart-item-name">${item.name}</div>
                            <div>${item.quantity} × ${item.sellingPrice} ج.س</div>
                        </div>
                        <div class="cart-item-price">${itemTotal} ج.س</div>
                        <div class="cart-item-actions">
                            <button onclick="updateQuantity(${index}, ${item.quantity - 1})">-</button>
                            <button onclick="updateQuantity(${index}, ${item.quantity + 1})">+</button>
                            <button onclick="removeFromCart(${index})">🗑️</button>
                        </div>
                    </div>
                `;
            });
            cartDiv.innerHTML = html;
            totalDiv.style.display = 'block';
            document.getElementById('cartTotalAmount').innerHTML = total;
        }
        
        function updateQuantity(index, newQty) {
            if (newQty <= 0) {
                removeFromCart(index);
                return;
            }
            const product = products.find(p => p.id === cart[index].id);
            if (newQty > product.quantity) {
                alert('⚠️ الكمية غير متوفرة');
                return;
            }
            cart[index].quantity = newQty;
            updateCart();
        }
        
        function removeFromCart(index) {
            cart.splice(index, 1);
            updateCart();
        }
        
        function checkout() {
            if (cart.length === 0) {
                alert('السلة فارغة');
                return;
            }
            const total = cart.reduce((sum, item) => sum + (item.sellingPrice * item.quantity), 0);
            if (confirm(`إجمالي الفاتورة: ${total} ج.س\nتأكيد البيع؟`)) {
                // تحديث المخزون
                cart.forEach(cartItem => {
                    const p = products.find(p => p.id === cartItem.id);
                    if (p) p.quantity -= cartItem.quantity;
                });
                localStorage.setItem('products', JSON.stringify(products));
                
                // حفظ الفاتورة
                const invoices = JSON.parse(localStorage.getItem('invoices') || '[]');
                const newInvoice = {
                    id: Date.now(),
                    number: `INV-${Date.now()}`,
                    customerName: 'نقدي',
                    items: cart.map(i => ({ name: i.name, quantity: i.quantity, price: i.sellingPrice, total: i.sellingPrice * i.quantity })),
                    total: total,
                    date: new Date().toISOString(),
                    paymentMethod: 'نقدي'
                };
                invoices.push(newInvoice);
                localStorage.setItem('invoices', JSON.stringify(invoices));
                
                alert('✅ تم إتمام البيع بنجاح');
                cart = [];
                updateCart();
                displayProducts();
            }
        }
        
        function handleSearch() {
            searchTerm = document.getElementById('searchInput').value.trim();
            const clearBtn = document.getElementById('clearSearchBtn');
            clearBtn.style.display = searchTerm ? 'flex' : 'none';
            displayProducts();
        }
        
        function clearSearch() {
            document.getElementById('searchInput').value = '';
            searchTerm = '';
            document.getElementById('clearSearchBtn').style.display = 'none';
            displayProducts();
        }
        
        function setSearchType(type) {
            searchType = type;
            document.querySelectorAll('.search-type-btn').forEach(btn => {
                if (btn.dataset.type === type) btn.classList.add('active');
                else btn.classList.remove('active');
            });
            displayProducts();
        }
        
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); }
        function logout() { sessionStorage.clear(); window.location.href = 'index.html'; }
        
        document.getElementById('searchInput').addEventListener('input', handleSearch);
        document.getElementById('clearSearchBtn').addEventListener('click', clearSearch);
        document.querySelectorAll('.search-type-btn').forEach(btn => {
            btn.addEventListener('click', () => setSearchType(btn.dataset.type));
        });
        
        document.getElementById('userName').innerHTML = sessionStorage.getItem('userName') || 'مدير';
        if (!sessionStorage.getItem('loggedIn')) window.location.href = 'index.html';
        loadProducts();
    </script>
</body>
</html>
