<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>نقطة البيع - نظام الصيدليات</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Cairo', sans-serif;
            background: #f0f2f5;
            height: 100vh;
            overflow: hidden;
        }
        .app-container { display: flex; height: 100vh; }
        .sidebar {
            width: 260px;
            background: white;
            box-shadow: 2px 0 10px rgba(0,0,0,0.1);
            height: 100%;
            overflow-y: auto;
        }
        .sidebar-header { padding: 20px; text-align: center; border-bottom: 1px solid #e0e0e0; }
        .sidebar-header i { font-size: 40px; color: #2c7da0; }
        .sidebar-nav a {
            display: flex;
            align-items: center;
            padding: 12px 20px;
            color: #2c3e50;
            text-decoration: none;
        }
        .sidebar-nav a:hover, .sidebar-nav a.active {
            background: linear-gradient(90deg, #2c7da0, #61a5c2);
            color: white;
        }
        .sidebar-nav i { width: 24px; margin-left: 10px; }
        .sidebar-footer {
            padding: 20px;
            border-top: 1px solid #e0e0e0;
            position: absolute;
            bottom: 0;
            width: 260px;
        }
        .logout-btn {
            width: 100%;
            padding: 10px;
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .top-bar {
            background: white;
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .menu-toggle {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
        }
        .content-wrapper {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }
        .pos-container {
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 20px;
            height: 100%;
        }
        .products-section {
            background: white;
            border-radius: 15px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        .search-bar { margin-bottom: 20px; }
        .search-input-wrapper { display: flex; gap: 10px; }
        .search-input-wrapper input {
            flex: 1;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-family: 'Cairo', sans-serif;
        }
        .search-clear {
            background: #e74c3c;
            color: white;
            border: none;
            width: 40px;
            border-radius: 10px;
            cursor: pointer;
        }
        .search-type {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        .search-type-btn {
            padding: 5px 15px;
            border: 1px solid #ddd;
            background: white;
            border-radius: 20px;
            cursor: pointer;
        }
        .search-type-btn.active {
            background: #2c7da0;
            color: white;
        }
        .product-grid {
            flex: 1;
            overflow-y: auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 12px;
        }
        .product-card {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            border: 1px solid #e0e0e0;
            transition: 0.2s;
        }
        .product-card:hover { background: #2c7da0; color: white; transform: translateY(-2px); }
        .product-name { font-weight: bold; }
        .product-price { color: #2c7da0; font-weight: bold; }
        .product-card:hover .product-price { color: white; }
        .cart-section {
            background: white;
            border-radius: 15px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        .cart-items { flex: 1; overflow-y: auto; margin: 15px 0; }
        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid #e0e0e0;
        }
        .cart-item-actions button {
            background: none;
            border: none;
            cursor: pointer;
            padding: 5px;
        }
        .cart-total {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            margin-top: 10px;
        }
        .btn-checkout {
            width: 100%;
            padding: 12px;
            background: #27ae60;
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: white;
            border-radius: 20px;
            width: 90%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal-header {
            background: #2c7da0;
            color: white;
            padding: 15px 20px;
            border-radius: 20px 20px 0 0;
            display: flex;
            justify-content: space-between;
        }
        .modal-body { padding: 20px; }
        .modal-footer {
            padding: 15px 20px;
            border-top: 1px solid #ddd;
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; }
        .form-group select, .form-group input {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-family: 'Cairo', sans-serif;
        }
        .payment-methods {
            display: flex;
            gap: 15px;
            margin-top: 10px;
        }
        .payment-method {
            flex: 1;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
        }
        .payment-method.selected {
            border-color: #27ae60;
            background: #e8f8f5;
            color: #27ae60;
        }
        .btn-add-customer {
            background: #2c7da0;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 8px;
            width: 100%;
        }
        @media (max-width: 768px) {
            .pos-container { grid-template-columns: 1fr; }
            .sidebar { position: fixed; transform: translateX(-100%); }
            .sidebar.active { transform: translateX(0); }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <img id="sidebarLogo" src="" alt="الشعار" style="max-width: 60px; max-height: 60px; display: none; margin-bottom: 5px;">
                <i class="fas fa-hospital-user"></i>
                <h3 id="pharmacyNameHeader">نظام الصيدلية</h3>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html"><i class="fas fa-chart-line"></i> لوحة التحكم</a>
                <a href="inventory.html"><i class="fas fa-boxes"></i> المخزون</a>
                <a href="pos.html" class="active"><i class="fas fa-cash-register"></i> نقطة البيع</a>
                <a href="customers.html"><i class="fas fa-users"></i> العملاء</a>
                <a href="invoices.html"><i class="fas fa-file-invoice"></i> الفواتير</a>
                <a href="reports.html"><i class="fas fa-chart-bar"></i> التقارير</a>
                <a href="settings.html"><i class="fas fa-cog"></i> الإعدادات</a>
            </nav>
            <div class="sidebar-footer"><button onclick="logout()" class="logout-btn">تسجيل الخروج</button></div>
        </aside>
        <main class="main-content">
            <header class="top-bar">
                <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
                <div><span id="userName"></span> <i class="fas fa-user-circle"></i></div>
            </header>
            <div class="content-wrapper">
                <div class="pos-container">
                    <div class="products-section">
                        <div class="search-bar">
                            <div class="search-input-wrapper">
                                <input type="text" id="searchInput" placeholder="بحث بالاسم أو الباركود">
                                <button class="search-clear" id="clearSearchBtn" style="display: none;">✕</button>
                            </div>
                            <div class="search-type">
                                <button class="search-type-btn active" data-type="all">الكل</button>
                                <button class="search-type-btn" data-type="name">بحث بالاسم</button>
                                <button class="search-type-btn" data-type="barcode">بحث بالباركود</button>
                            </div>
                        </div>
                        <div class="product-grid" id="productGrid"></div>
                    </div>
                    <div class="cart-section">
                        <h3>🛒 سلة المشتريات</h3>
                        <div class="cart-items" id="cartItems"></div>
                        <div class="cart-total" id="cartTotal" style="display: none;">
                            <div><strong>الإجمالي: <span id="cartTotalAmount">0</span> ج.س</strong></div>
                            <button class="btn-checkout" id="checkoutBtn">إتمام البيع</button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- نافذة الدفع (نفسها بدون تغيير) -->
    <div id="paymentModal" class="modal">... (كما هي)</div>
    <div id="addCustomerModal" class="modal">... (كما هي)</div>

    <script>
        let products = [];
        let cart = [];
        let searchTerm = '';
        let searchType = 'all';
        let selectedPaymentMethod = 'cash';
        let currentPharmacyId = null;

        // دالة تحميل الشعار واسم الصيدلية (من localStorage مؤقتاً)
        function loadCompanyInfo() {
            const savedLogo = localStorage.getItem('pharmacyLogo');
            if (savedLogo) {
                const sidebarLogo = document.getElementById('sidebarLogo');
                if (sidebarLogo) {
                    sidebarLogo.src = savedLogo;
                    sidebarLogo.style.display = 'block';
                }
            }
            const settings = JSON.parse(localStorage.getItem('pharmacySettings') || '{}');
            if (settings.pharmacyName) {
                document.getElementById('pharmacyNameHeader').innerHTML = settings.pharmacyName;
            }
        }

        function getCompanyData() {
            const savedData = localStorage.getItem('companyData');
            if (savedData) {
                return JSON.parse(savedData);
            }
            return { pharmacyName: '', commercialRegister: '', taxNumber: '', phone: '', email: '', address: '', website: '' };
        }

        function formatQRText() {
            const data = getCompanyData();
            let parts = [];
            if (data.pharmacyName) parts.push(data.pharmacyName);
            if (data.commercialRegister) parts.push(`سجل:${data.commercialRegister}`);
            if (data.taxNumber) parts.push(`ضريبي:${data.taxNumber}`);
            if (data.phone) parts.push(data.phone);
            if (data.address) parts.push(data.address);
            if (parts.length === 0) return 'بيانات الصيدلية';
            if (parts.join(' | ').length > 100) return parts[0];
            return parts.join(' | ');
        }

        // تحميل المنتجات من Firebase
        async function loadProducts() {
            const user = firebase.auth().currentUser;
            if (!user) return;
            currentPharmacyId = user.uid;
            const productsRef = firebase.firestore().collection('pharmacies').doc(currentPharmacyId).collection('products');
            const snapshot = await productsRef.get();
            products = [];
            snapshot.forEach(doc => products.push({ id: doc.id, ...doc.data() }));
            displayProducts();
        }

        function displayProducts() {
            const grid = document.getElementById('productGrid');
            let filtered = products;
            if (searchTerm) {
                if (searchType === 'name') filtered = products.filter(p => p.name.toLowerCase().includes(searchTerm.toLowerCase()));
                else if (searchType === 'barcode') filtered = products.filter(p => p.barcode && p.barcode.toLowerCase().includes(searchTerm.toLowerCase()));
                else filtered = products.filter(p => p.name.toLowerCase().includes(searchTerm.toLowerCase()) || (p.barcode && p.barcode.toLowerCase().includes(searchTerm.toLowerCase())));
            }
            if (filtered.length === 0) { grid.innerHTML = '<div style="text-align:center;padding:40px;">🔍 لا توجد منتجات</div>'; return; }
            let html = '';
            filtered.forEach(p => {
                html += `<div class="product-card" onclick="addToCart('${p.id}')"><div class="product-name">${p.name}</div><div class="product-price">${p.sellingPrice} ج.س</div><div class="product-stock">المتبقي: ${p.quantity}</div></div>`;
            });
            grid.innerHTML = html;
        }

        function addToCart(id) {
            const product = products.find(p => p.id === id);
            if (!product || product.quantity <= 0) { alert('⚠️ المنتج غير متوفر'); return; }
            const existing = cart.find(item => item.id === id);
            if (existing) {
                if (existing.quantity + 1 > product.quantity) { alert('⚠️ الكمية غير متوفرة'); return; }
                existing.quantity++;
            } else {
                cart.push({ id: product.id, name: product.name, price: product.sellingPrice, quantity: 1 });
            }
            updateCart();
        }

        function updateCart() {
            const cartDiv = document.getElementById('cartItems');
            const totalDiv = document.getElementById('cartTotal');
            if (cart.length === 0) { cartDiv.innerHTML = '<div style="text-align:center;padding:40px;">🛒 السلة فارغة</div>'; totalDiv.style.display = 'none'; return; }
            let total = 0;
            let html = '';
            cart.forEach((item, idx) => {
                const itemTotal = item.price * item.quantity;
                total += itemTotal;
                html += `<div class="cart-item"><div><strong>${item.name}</strong><br>${item.quantity} × ${item.price} ج.س</div><div>${itemTotal} ج.س</div><div class="cart-item-actions"><button onclick="updateQuantity(${idx}, ${item.quantity - 1})">-</button><button onclick="updateQuantity(${idx}, ${item.quantity + 1})">+</button><button onclick="removeFromCart(${idx})">🗑️</button></div></div>`;
            });
            cartDiv.innerHTML = html;
            totalDiv.style.display = 'block';
            document.getElementById('cartTotalAmount').innerHTML = total;
        }

        function updateQuantity(idx, newQty) {
            if (newQty <= 0) { removeFromCart(idx); return; }
            const product = products.find(p => p.id === cart[idx].id);
            if (newQty > product.quantity) { alert('⚠️ الكمية غير متوفرة'); return; }
            cart[idx].quantity = newQty;
            updateCart();
        }

        function removeFromCart(idx) { cart.splice(idx, 1); updateCart(); }

        function openPaymentModal() {
            if (cart.length === 0) { alert('⚠️ السلة فارغة'); return; }
            const total = cart.reduce((s, i) => s + (i.price * i.quantity), 0);
            document.getElementById('summaryItemCount').innerHTML = cart.length;
            document.getElementById('summaryTotal').innerHTML = total + ' ج.س';
            loadCustomersToSelect();
            document.getElementById('paymentModal').classList.add('active');
        }

        async function loadCustomersToSelect() {
            const user = firebase.auth().currentUser;
            if (!user) return;
            const customersRef = firebase.firestore().collection('pharmacies').doc(user.uid).collection('customers');
            const snapshot = await customersRef.get();
            const select = document.getElementById('customerSelect');
            select.innerHTML = '<option value="cash">🔄 نقدي (بدون عميل)</option>';
            snapshot.forEach(doc => {
                const c = doc.data();
                select.innerHTML += `<option value="${doc.id}">👤 ${c.name}</option>`;
            });
        }

        function openAddCustomerModal() { document.getElementById('addCustomerModal').classList.add('active'); }
        function closeAddCustomerModal() { document.getElementById('addCustomerModal').classList.remove('active'); }

        async function saveNewCustomer() {
            const name = document.getElementById('newCustomerName').value.trim();
            if (!name) { alert('⚠️ اسم العميل مطلوب'); return; }
            const phone = document.getElementById('newCustomerPhone').value;
            const email = document.getElementById('newCustomerEmail').value;
            const user = firebase.auth().currentUser;
            if (!user) { alert("الرجاء تسجيل الدخول"); return; }
            const customersRef = firebase.firestore().collection('pharmacies').doc(user.uid).collection('customers');
            const newId = Date.now().toString();
            await customersRef.doc(newId).set({ name, phone, email, totalSpent: 0 });
            closeAddCustomerModal();
            await loadCustomersToSelect();
            document.getElementById('customerSelect').value = newId;
            alert('✅ تم إضافة العميل بنجاح');
        }

        async function completeSale() {
            const customerValue = document.getElementById('customerSelect').value;
            let customerName = 'نقدي';
            let customerId = null;
            if (customerValue !== 'cash') {
                const customersRef = firebase.firestore().collection('pharmacies').doc(currentPharmacyId).collection('customers');
                const customerDoc = await customersRef.doc(customerValue).get();
                if (customerDoc.exists) {
                    customerName = customerDoc.data().name;
                    customerId = customerValue;
                }
            }
            const total = cart.reduce((s, i) => s + (i.price * i.quantity), 0);
            let paymentMethod = '';
            let paymentDetails = {};
            if (selectedPaymentMethod === 'cash') {
                paymentMethod = 'نقدي';
            } else {
                const bankName = document.getElementById('bankName').value.trim();
                const transferNumber = document.getElementById('transferNumber').value.trim();
                const transferName = document.getElementById('transferName').value.trim();
                if (!bankName || !transferNumber || !transferName) { alert('⚠️ يرجى إكمال بيانات التحويل البنكي'); return; }
                paymentMethod = 'تحويل بنكي';
                paymentDetails = { bankName, transferNumber, transferName };
            }
            const notes = document.getElementById('paymentNotes').value;

            // تحديث المخزون في Firebase
            const productsRef = firebase.firestore().collection('pharmacies').doc(currentPharmacyId).collection('products');
            for (const item of cart) {
                const productDoc = await productsRef.doc(item.id).get();
                const newQuantity = productDoc.data().quantity - item.quantity;
                await productsRef.doc(item.id).update({ quantity: newQuantity });
            }

            // تحديث إجمالي مشتريات العميل في Firebase
            if (customerId) {
                const customersRef = firebase.firestore().collection('pharmacies').doc(currentPharmacyId).collection('customers');
                const customerDoc = await customersRef.doc(customerId).get();
                const currentTotal = customerDoc.data().totalSpent || 0;
                await customersRef.doc(customerId).update({ totalSpent: currentTotal + total });
            }

            // حفظ الفاتورة في Firebase
            const invoicesRef = firebase.firestore().collection('pharmacies').doc(currentPharmacyId).collection('invoices');
            const newInvoice = {
                number: `INV-${new Date().getFullYear()}-${Date.now()}`,
                customerId: customerId,
                customerName: customerName,
                items: cart.map(i => ({ name: i.name, quantity: i.quantity, price: i.price, total: i.price * i.quantity })),
                total: total,
                paymentMethod: paymentMethod,
                paymentDetails: paymentDetails,
                notes: notes,
                date: new Date().toISOString(),
                status: 'completed'
            };
            await invoicesRef.add(newInvoice);

            if(confirm("🖨️ هل تريد طباعة الفاتورة؟")) { printInvoice(newInvoice); } 
            alert(`✅ تم إتمام البيع\nرقم الفاتورة: ${newInvoice.number}\nالمبلغ: ${total} ج.س`);
            cart = [];
            updateCart();
            await loadProducts(); // تحديث المنتجات من Firebase بعد البيع
            closePaymentModal();
        }

        function printInvoice(invoice) {
            const companyData = getCompanyData();
            const savedLogo = localStorage.getItem('pharmacyLogo');
            const settings = JSON.parse(localStorage.getItem('pharmacySettings') || '{}');
            const currencySymbol = settings.currencySymbol || 'ج.س';
            const date = new Date(invoice.date);
            const formattedDate = `${date.getFullYear()}-${(date.getMonth()+1).toString().padStart(2,'0')}-${date.getDate().toString().padStart(2,'0')}`;
            const formattedTime = `${date.getHours().toString().padStart(2,'0')}:${date.getMinutes().toString().padStart(2,'0')}`;
            
            let logoHtml = '';
            if (savedLogo) {
                logoHtml = `<img src="${savedLogo}" style="max-width: 100px; max-height: 70px; margin-bottom: 8px;">`;
            }
            
            let companyInfoHtml = '';
            if (companyData.pharmacyName) companyInfoHtml += `<h2 style="margin:0; font-size:16px; color:#2c7da0;">${companyData.pharmacyName}</h2>`;
            if (companyData.commercialRegister) companyInfoHtml += `<div>سجل تجاري: ${companyData.commercialRegister}`;
            if (companyData.taxNumber) companyInfoHtml += ` | رقم ضريبي: ${companyData.taxNumber}</div>`;
            if (companyData.phone) companyInfoHtml += `<div>📞 ${companyData.phone}</div>`;
            if (companyData.address) companyInfoHtml += `<div>📍 ${companyData.address}</div>`;
            
            const qrTextShort = formatQRText();
            
            let itemsHtml = '';
            invoice.items.forEach(item => {
                itemsHtml += `<tr>
                    <td style="padding:6px 4px;border:1px solid #dee2e6;text-align:right;">${item.name}</td>
                    <td style="padding:6px 4px;border:1px solid #dee2e6;text-align:center;">${item.quantity}</td>
                    <td style="padding:6px 4px;border:1px solid #dee2e6;text-align:center;">${item.price.toFixed(2)}</td>
                    <td style="padding:6px 4px;border:1px solid #dee2e6;text-align:center;">${item.total.toFixed(2)}</td>
                </tr>`;
            });
            
            const win = window.open('', '_blank');
            win.document.write(`
                <html dir="rtl">
                <head>
                    <title>فاتورة ${invoice.number}</title>
                    <meta charset="UTF-8">
                    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"><\/script>
                    <style>
                        /* نفس الاستايلات القديمة */
                        * { margin: 0; padding: 0; box-sizing: border-box; }
                        body { font-family: 'Cairo', 'Tahoma', sans-serif; background: #fff; padding: 15px; margin: 0; }
                        .invoice-wrapper { max-width: 350px; margin: 0 auto; background: white; }
                        .invoice-header { text-align: center; padding: 10px 0; border-bottom: 2px dashed #2c7da0; margin-bottom: 10px; }
                        .company-details { font-size: 11px; color: #555; line-height: 1.4; margin-top: 5px; }
                        .invoice-title { font-size: 14px; font-weight: bold; margin: 5px 0; color: #2c7da0; }
                        .info-row { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 5px; padding: 3px 0; border-bottom: 1px dotted #eee; }
                        .info-label { font-weight: bold; color: #2c3e50; }
                        .items-table { width: 100%; border-collapse: collapse; margin: 10px 0; font-size: 10px; }
                        .items-table th { background: #f8f9fa; padding: 5px 2px; border: 1px solid #dee2e6; text-align: center; font-weight: bold; }
                        .items-table td { padding: 5px 2px; border: 1px solid #dee2e6; text-align: center; }
                        .total-row { display: flex; justify-content: space-between; padding: 6px 0; margin-top: 6px; border-top: 2px solid #2c7da0; font-weight: bold; font-size: 13px; }
                        .qr-section { text-align: center; margin: 10px 0; padding: 6px 0; min-height: 120px; }
                        .footer { text-align: center; font-size: 9px; color: #888; margin-top: 10px; padding-top: 6px; border-top: 1px dashed #ddd; }
                    </style>
                </head>
                <body>
                    <div class="invoice-wrapper">
                        <div class="invoice-header">
                            ${logoHtml}
                            <div class="company-details">${companyInfoHtml}</div>
                            <div class="invoice-title">فاتورة شراء</div>
                        </div>
                        <div class="info-row"><span class="info-label">رقم الفاتورة:</span><span>${invoice.number}</span></div>
                        <div class="info-row"><span class="info-label">التاريخ:</span><span>${formattedDate} - ${formattedTime}</span></div>
                        <div class="info-row"><span class="info-label">العميل:</span><span>${invoice.customerName}</span></div>
                        <div class="info-row"><span class="info-label">طريقة الدفع:</span><span>${invoice.paymentMethod}</span></div>
                        <table class="items-table"><thead><th>المنتج</th><th>الكمية</th><th>السعر</th><th>الإجمالي</th></thead><tbody>${itemsHtml}</tbody></table>
                        <div class="total-row"><span>الإجمالي</span><span>${invoice.total.toFixed(2)} ${currencySymbol}</span></div>
                        <div id="printQRCode" class="qr-section"></div>
                        <div class="footer">${companyData.pharmacyName || 'نظام الصيدليات'}<br>شكراً لثقتكم</div>
                    </div>
                    <script>
                        (function() {
                            let attempts = 0;
                            function generateQR() {
                                var container = document.getElementById('printQRCode');
                                if (!container && attempts < 15) { attempts++; setTimeout(generateQR, 150); return; }
                                if (!container) return;
                                try {
                                    var qrText = ${JSON.stringify(qrTextShort)};
                                    if (qrText && qrText !== 'بيانات الصيدلية' && qrText.length > 0) {
                                        container.innerHTML = '';
                                        var qr = qrcode(0, 'M');
                                        qr.addData(qrText);
                                        qr.make();
                                        var cellSize = 4, margin = 4;
                                        var canvas = document.createElement('canvas');
                                        canvas.width = qr.getModuleCount() * cellSize + margin * 2;
                                        canvas.height = qr.getModuleCount() * cellSize + margin * 2;
                                        canvas.style.width = '120px';
                                        canvas.style.height = 'auto';
                                        var ctx = canvas.getContext('2d');
                                        ctx.fillStyle = '#ffffff';
                                        ctx.fillRect(0, 0, canvas.width, canvas.height);
                                        ctx.fillStyle = '#000000';
                                        for (var row = 0; row < qr.getModuleCount(); row++) {
                                            for (var col = 0; col < qr.getModuleCount(); col++) {
                                                if (qr.isDark(row, col)) {
                                                    ctx.fillRect(col * cellSize + margin, row * cellSize + margin, cellSize, cellSize);
                                                }
                                            }
                                        }
                                        container.appendChild(canvas);
                                    } else {
                                        container.innerHTML = '<div style="font-size:12px;color:#2c7da0;">${companyData.pharmacyName || "بيانات الصيدلية"}</div>';
                                    }
                                } catch(e) { console.log('QR Error:', e); if (container) container.innerHTML = '<div style="font-size:12px;color:#2c7da0;">شكراً لكم</div>'; }
                            }
                            if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', generateQR);
                            else generateQR();
                        })();
                    <\/script>
                </body>
                </html>
            `);
            win.document.close();
            setTimeout(() => { win.print(); win.close(); }, 800);
        }

        function closePaymentModal() { document.getElementById('paymentModal').classList.remove('active'); }
        function handleSearch() {
            searchTerm = document.getElementById('searchInput').value.trim();
            document.getElementById('clearSearchBtn').style.display = searchTerm ? 'flex' : 'none';
            displayProducts();
        }
        function clearSearch() { document.getElementById('searchInput').value = ''; searchTerm = ''; document.getElementById('clearSearchBtn').style.display = 'none'; displayProducts(); }
        function setSearchType(type) { searchType = type; document.querySelectorAll('.search-type-btn').forEach(btn => { if (btn.dataset.type === type) btn.classList.add('active'); else btn.classList.remove('active'); }); displayProducts(); }
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); }
        function logout() { sessionStorage.clear(); window.location.href = 'index.html'; }

        document.getElementById('searchInput').addEventListener('input', handleSearch);
        document.getElementById('clearSearchBtn').addEventListener('click', clearSearch);
        document.querySelectorAll('.search-type-btn').forEach(btn => btn.addEventListener('click', () => setSearchType(btn.dataset.type)));
        document.getElementById('checkoutBtn').addEventListener('click', openPaymentModal);
        document.getElementById('confirmSaleBtn').addEventListener('click', completeSale);
        document.querySelectorAll('.payment-method').forEach(btn => {
            btn.addEventListener('click', () => {
                selectedPaymentMethod = btn.dataset.method;
                document.querySelectorAll('.payment-method').forEach(m => m.classList.remove('selected'));
                btn.classList.add('selected');
                document.getElementById('bankDetails').style.display = selectedPaymentMethod === 'bank' ? 'block' : 'none';
            });
        });
        document.querySelector('.payment-method[data-method="cash"]').classList.add('selected');

        document.getElementById('userName').innerHTML = sessionStorage.getItem('userName') || 'مدير';
        if (!sessionStorage.getItem('loggedIn')) window.location.href = 'index.html';
        
        firebase.auth().onAuthStateChanged((user) => {
            if (user) {
                loadProducts();
                loadCompanyInfo();
            } else {
                window.location.href = 'index.html';
            }
        });
    </script>
</body>
</html>
