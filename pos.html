<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>نقطة البيع - نظام الصيدليات</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Cairo', sans-serif;
            background: #f0f2f5;
            height: 100vh;
            overflow: hidden;
        }
        .app-container { display: flex; height: 100vh; }
        .sidebar {
            width: 260px;
            background: white;
            box-shadow: 2px 0 10px rgba(0,0,0,0.1);
            height: 100%;
            overflow-y: auto;
        }
        .sidebar-header { padding: 20px; text-align: center; border-bottom: 1px solid #e0e0e0; }
        .sidebar-header i { font-size: 40px; color: #2c7da0; }
        .sidebar-nav a {
            display: flex;
            align-items: center;
            padding: 12px 20px;
            color: #2c3e50;
            text-decoration: none;
        }
        .sidebar-nav a:hover, .sidebar-nav a.active {
            background: linear-gradient(90deg, #2c7da0, #61a5c2);
            color: white;
        }
        .sidebar-nav i { width: 24px; margin-left: 10px; }
        .sidebar-footer {
            padding: 20px;
            border-top: 1px solid #e0e0e0;
            position: absolute;
            bottom: 0;
            width: 260px;
        }
        .logout-btn {
            width: 100%;
            padding: 10px;
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .top-bar {
            background: white;
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .menu-toggle {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
        }
        .content-wrapper {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }
        .pos-container {
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 20px;
            height: 100%;
        }
        .products-section {
            background: white;
            border-radius: 15px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        .search-bar { margin-bottom: 20px; }
        .search-input-wrapper { display: flex; gap: 10px; }
        .search-input-wrapper input {
            flex: 1;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-family: 'Cairo', sans-serif;
        }
        .search-clear {
            background: #e74c3c;
            color: white;
            border: none;
            width: 40px;
            border-radius: 10px;
            cursor: pointer;
        }
        .search-type {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        .search-type-btn {
            padding: 5px 15px;
            border: 1px solid #ddd;
            background: white;
            border-radius: 20px;
            cursor: pointer;
        }
        .search-type-btn.active {
            background: #2c7da0;
            color: white;
        }
        .product-grid {
            flex: 1;
            overflow-y: auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 12px;
        }
        .product-card {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            border: 1px solid #e0e0e0;
            transition: 0.2s;
        }
        .product-card:hover { background: #2c7da0; color: white; transform: translateY(-2px); }
        .product-name { font-weight: bold; }
        .product-price { color: #2c7da0; font-weight: bold; }
        .product-card:hover .product-price { color: white; }
        .cart-section {
            background: white;
            border-radius: 15px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        .cart-items { flex: 1; overflow-y: auto; margin: 15px 0; }
        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid #e0e0e0;
        }
        .cart-item-actions button {
            background: none;
            border: none;
            cursor: pointer;
            padding: 5px;
        }
        .cart-total {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            margin-top: 10px;
        }
        .btn-checkout {
            width: 100%;
            padding: 12px;
            background: #27ae60;
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: white;
            border-radius: 20px;
            width: 90%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal-header {
            background: #2c7da0;
            color: white;
            padding: 15px 20px;
            border-radius: 20px 20px 0 0;
            display: flex;
            justify-content: space-between;
        }
        .modal-body { padding: 20px; }
        .modal-footer {
            padding: 15px 20px;
            border-top: 1px solid #ddd;
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; }
        .form-group select, .form-group input {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-family: 'Cairo', sans-serif;
        }
        .payment-methods {
            display: flex;
            gap: 15px;
            margin-top: 10px;
        }
        .payment-method {
            flex: 1;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
        }
        .payment-method.selected {
            border-color: #27ae60;
            background: #e8f8f5;
            color: #27ae60;
        }
        .btn-add-customer {
            background: #2c7da0;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 8px;
            width: 100%;
        }
        @media (max-width: 768px) {
            .pos-container { grid-template-columns: 1fr; }
            .sidebar { position: fixed; transform: translateX(-100%); }
            .sidebar.active { transform: translateX(0); }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header"><i class="fas fa-hospital-user"></i><h3>نظام الصيدلية</h3></div>
            <nav class="sidebar-nav">
                <a href="dashboard.html"><i class="fas fa-chart-line"></i> لوحة التحكم</a>
                <a href="inventory.html"><i class="fas fa-boxes"></i> المخزون</a>
                <a href="pos.html" class="active"><i class="fas fa-cash-register"></i> نقطة البيع</a>
                <a href="customers.html"><i class="fas fa-users"></i> العملاء</a>
                <a href="invoices.html"><i class="fas fa-file-invoice"></i> الفواتير</a>
                <a href="reports.html"><i class="fas fa-chart-bar"></i> التقارير</a>
                <a href="settings.html"><i class="fas fa-cog"></i> الإعدادات</a>
            </nav>
            <div class="sidebar-footer"><button onclick="logout()" class="logout-btn">تسجيل الخروج</button></div>
        </aside>
        <main class="main-content">
            <header class="top-bar">
                <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
                <div><span id="userName"></span> <i class="fas fa-user-circle"></i></div>
            </header>
            <div class="content-wrapper">
                <div class="pos-container">
                    <div class="products-section">
                        <div class="search-bar">
                            <div class="search-input-wrapper">
                                <input type="text" id="searchInput" placeholder="بحث بالاسم أو الباركود">
                                <button class="search-clear" id="clearSearchBtn" style="display: none;">✕</button>
                            </div>
                            <div class="search-type">
                                <button class="search-type-btn active" data-type="all">الكل</button>
                                <button class="search-type-btn" data-type="name">بحث بالاسم</button>
                                <button class="search-type-btn" data-type="barcode">بحث بالباركود</button>
                            </div>
                        </div>
                        <div class="product-grid" id="productGrid"></div>
                    </div>
                    <div class="cart-section">
                        <h3>🛒 سلة المشتريات</h3>
                        <div class="cart-items" id="cartItems"></div>
                        <div class="cart-total" id="cartTotal" style="display: none;">
                            <div><strong>الإجمالي: <span id="cartTotalAmount">0</span> ج.س</strong></div>
                            <button class="btn-checkout" id="checkoutBtn">إتمام البيع</button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- نافذة الدفع -->
    <div id="paymentModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>💰 إتمام عملية البيع</h3>
                <button onclick="closePaymentModal()" style="background:none;border:none;color:white;font-size:24px;">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>👤 اختيار العميل</label>
                    <select id="customerSelect">
                        <option value="cash">🔄 نقدي (بدون عميل)</option>
                    </select>
                    <button class="btn-add-customer" onclick="openAddCustomerModal()">+ إضافة عميل جديد</button>
                </div>
                <div class="form-group">
                    <label>💳 طريقة الدفع</label>
                    <div class="payment-methods">
                        <div class="payment-method" data-method="cash">💰 نقدي</div>
                        <div class="payment-method" data-method="bank">🏦 تحويل بنكي</div>
                    </div>
                </div>
                <div id="bankDetails" style="display: none;">
                    <div class="form-group">
                        <label>🏦 اسم البنك</label>
                        <input type="text" id="bankName" placeholder="مثال: بنك الخرطوم">
                    </div>
                    <div class="form-group">
                        <label>📝 رقم الحوالة</label>
                        <input type="text" id="transferNumber" placeholder="أدخل رقم الحوالة">
                    </div>
                    <div class="form-group">
                        <label>👤 اسم المحول</label>
                        <input type="text" id="transferName" placeholder="اسم الشخص المحول">
                    </div>
                </div>
                <div class="form-group">
                    <label>📝 ملاحظات</label>
                    <input type="text" id="paymentNotes" placeholder="ملاحظات إضافية">
                </div>
                <div class="invoice-summary" style="background:#f8f9fa;padding:12px;border-radius:8px;">
                    <div style="display:flex;justify-content:space-between;"><span>عدد الأصناف:</span><span id="summaryItemCount">0</span></div>
                    <div style="display:flex;justify-content:space-between;font-weight:bold;margin-top:8px;"><span>الإجمالي:</span><span id="summaryTotal">0 ج.س</span></div>
                </div>
            </div>
            <div class="modal-footer">
                <button onclick="closePaymentModal()" style="background:#95a5a6;color:white;padding:10px 20px;border:none;border-radius:8px;">إلغاء</button>
                <button id="confirmSaleBtn" style="background:#27ae60;color:white;padding:10px 20px;border:none;border-radius:8px;">تأكيد البيع</button>
            </div>
        </div>
    </div>

    <!-- نافذة إضافة عميل جديد -->
    <div id="addCustomerModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>➕ إضافة عميل جديد</h3>
                <button onclick="closeAddCustomerModal()" style="background:none;border:none;color:white;font-size:24px;">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>اسم العميل *</label>
                    <input type="text" id="newCustomerName" placeholder="أدخل اسم العميل">
                </div>
                <div class="form-group">
                    <label>رقم الهاتف</label>
                    <input type="tel" id="newCustomerPhone" placeholder="رقم الهاتف">
                </div>
                <div class="form-group">
                    <label>البريد الإلكتروني</label>
                    <input type="email" id="newCustomerEmail" placeholder="البريد الإلكتروني">
                </div>
            </div>
            <div class="modal-footer">
                <button onclick="closeAddCustomerModal()" style="background:#95a5a6;color:white;padding:10px 20px;border:none;border-radius:8px;">إلغاء</button>
                <button onclick="saveNewCustomer()" style="background:#27ae60;color:white;padding:10px 20px;border:none;border-radius:8px;">حفظ العميل</button>
            </div>
        </div>
    </div>

    <script>
        let products = [];
        let cart = [];
        let searchTerm = '';
        let searchType = 'all';
        let selectedPaymentMethod = 'cash';

        function loadProducts() {
            const stored = localStorage.getItem('products');
            if (stored) products = JSON.parse(stored);
            else products = [];
            displayProducts();
        }

        function displayProducts() {
            const grid = document.getElementById('productGrid');
            let filtered = products;
            if (searchTerm) {
                if (searchType === 'name') filtered = products.filter(p => p.name.toLowerCase().includes(searchTerm.toLowerCase()));
                else if (searchType === 'barcode') filtered = products.filter(p => p.barcode && p.barcode.toLowerCase().includes(searchTerm.toLowerCase()));
                else filtered = products.filter(p => p.name.toLowerCase().includes(searchTerm.toLowerCase()) || (p.barcode && p.barcode.toLowerCase().includes(searchTerm.toLowerCase())));
            }
            if (filtered.length === 0) { grid.innerHTML = '<div style="text-align:center;padding:40px;">🔍 لا توجد منتجات</div>'; return; }
            let html = '';
            filtered.forEach(p => {
                html += `<div class="product-card" onclick="addToCart(${p.id})"><div class="product-name">${p.name}</div><div class="product-price">${p.sellingPrice} ج.س</div><div class="product-stock">المتبقي: ${p.quantity}</div></div>`;
            });
            grid.innerHTML = html;
        }

        function addToCart(id) {
            const product = products.find(p => p.id === id);
            if (!product || product.quantity <= 0) { alert('⚠️ المنتج غير متوفر'); return; }
            const existing = cart.find(item => item.id === id);
            if (existing) {
                if (existing.quantity + 1 > product.quantity) { alert('⚠️ الكمية غير متوفرة'); return; }
                existing.quantity++;
            } else {
                cart.push({ id: product.id, name: product.name, price: product.sellingPrice, quantity: 1 });
            }
            updateCart();
        }

        function updateCart() {
            const cartDiv = document.getElementById('cartItems');
            const totalDiv = document.getElementById('cartTotal');
            if (cart.length === 0) { cartDiv.innerHTML = '<div style="text-align:center;padding:40px;">🛒 السلة فارغة</div>'; totalDiv.style.display = 'none'; return; }
            let total = 0;
            let html = '';
            cart.forEach((item, idx) => {
                const itemTotal = item.price * item.quantity;
                total += itemTotal;
                html += `<div class="cart-item"><div><strong>${item.name}</strong><br>${item.quantity} × ${item.price} ج.س</div><div>${itemTotal} ج.س</div><div class="cart-item-actions"><button onclick="updateQuantity(${idx}, ${item.quantity - 1})">-</button><button onclick="updateQuantity(${idx}, ${item.quantity + 1})">+</button><button onclick="removeFromCart(${idx})">🗑️</button></div></div>`;
            });
            cartDiv.innerHTML = html;
            totalDiv.style.display = 'block';
            document.getElementById('cartTotalAmount').innerHTML = total;
        }

        function updateQuantity(idx, newQty) {
            if (newQty <= 0) { removeFromCart(idx); return; }
            const product = products.find(p => p.id === cart[idx].id);
            if (newQty > product.quantity) { alert('⚠️ الكمية غير متوفرة'); return; }
            cart[idx].quantity = newQty;
            updateCart();
        }

        function removeFromCart(idx) { cart.splice(idx, 1); updateCart(); }

        function openPaymentModal() {
            if (cart.length === 0) { alert('⚠️ السلة فارغة'); return; }
            const total = cart.reduce((s, i) => s + (i.price * i.quantity), 0);
            document.getElementById('summaryItemCount').innerHTML = cart.length;
            document.getElementById('summaryTotal').innerHTML = total + ' ج.س';
            loadCustomersToSelect();
            document.getElementById('paymentModal').classList.add('active');
        }

        function loadCustomersToSelect() {
            const customers = JSON.parse(localStorage.getItem('customers') || '[]');
            const select = document.getElementById('customerSelect');
            select.innerHTML = '<option value="cash">🔄 نقدي (بدون عميل)</option>';
            customers.forEach(c => { select.innerHTML += `<option value="${c.id}">👤 ${c.name}</option>`; });
        }

        function openAddCustomerModal() { document.getElementById('addCustomerModal').classList.add('active'); }
        function closeAddCustomerModal() { document.getElementById('addCustomerModal').classList.remove('active'); }

        function saveNewCustomer() {
            const name = document.getElementById('newCustomerName').value.trim();
            if (!name) { alert('⚠️ اسم العميل مطلوب'); return; }
            const phone = document.getElementById('newCustomerPhone').value;
            const email = document.getElementById('newCustomerEmail').value;
            const customers = JSON.parse(localStorage.getItem('customers') || '[]');
            const newId = customers.length ? Math.max(...customers.map(c => c.id)) + 1 : 1;
            customers.push({ id: newId, name, phone, email, totalSpent: 0 });
            localStorage.setItem('customers', JSON.stringify(customers));
            closeAddCustomerModal();
            loadCustomersToSelect();
            document.getElementById('customerSelect').value = newId;
            alert('✅ تم إضافة العميل بنجاح');
        }

        function completeSale() {
            const customerValue = document.getElementById('customerSelect').value;
            let customerName = 'نقدي';
            let customerId = null;
            if (customerValue !== 'cash') {
                const customers = JSON.parse(localStorage.getItem('customers') || '[]');
                const customer = customers.find(c => c.id == customerValue);
                if (customer) { customerName = customer.name; customerId = customer.id; }
            }
            const total = cart.reduce((s, i) => s + (i.price * i.quantity), 0);
            let paymentMethod = '';
            let paymentDetails = {};
            if (selectedPaymentMethod === 'cash') {
                paymentMethod = 'نقدي';
            } else {
                const bankName = document.getElementById('bankName').value.trim();
                const transferNumber = document.getElementById('transferNumber').value.trim();
                const transferName = document.getElementById('transferName').value.trim();
                if (!bankName || !transferNumber || !transferName) { alert('⚠️ يرجى إكمال بيانات التحويل البنكي'); return; }
                paymentMethod = 'تحويل بنكي';
                paymentDetails = { bankName, transferNumber, transferName };
            }
            const notes = document.getElementById('paymentNotes').value;
            let productsList = JSON.parse(localStorage.getItem('products') || '[]');
            cart.forEach(item => {
                const p = productsList.find(p => p.id === item.id);
                if (p) p.quantity -= item.quantity;
            });
            localStorage.setItem('products', JSON.stringify(productsList));
            if (customerId) {
                let customers = JSON.parse(localStorage.getItem('customers') || '[]');
                const idx = customers.findIndex(c => c.id == customerId);
                if (idx !== -1) { customers[idx].totalSpent = (customers[idx].totalSpent || 0) + total; localStorage.setItem('customers', JSON.stringify(customers)); }
            }
            const invoices = JSON.parse(localStorage.getItem('invoices') || '[]');
            const newInvoice = {
                id: Date.now(),
                number: `INV-${new Date().getFullYear()}-${(invoices.length+1).toString().padStart(4,'0')}`,
                customerId: customerId,
                customerName: customerName,
                items: cart.map(i => ({ name: i.name, quantity: i.quantity, price: i.price, total: i.price * i.quantity })),
                total: total,
                paymentMethod: paymentMethod,
                paymentDetails: paymentDetails,
                notes: notes,
                date: new Date().toISOString(),
                status: 'completed'
            };
            invoices.push(newInvoice);
            localStorage.setItem('invoices', JSON.stringify(invoices));
            alert(`✅ تم إتمام البيع\nرقم الفاتورة: ${newInvoice.number}\nالمبلغ: ${total} ج.س`);
            cart = [];
            updateCart();
            loadProducts();
            closePaymentModal();
        }

        function closePaymentModal() { document.getElementById('paymentModal').classList.remove('active'); }

        function handleSearch() {
            searchTerm = document.getElementById('searchInput').value.trim();
            document.getElementById('clearSearchBtn').style.display = searchTerm ? 'flex' : 'none';
            displayProducts();
        }
        function clearSearch() { document.getElementById('searchInput').value = ''; searchTerm = ''; document.getElementById('clearSearchBtn').style.display = 'none'; displayProducts(); }
        function setSearchType(type) { searchType = type; document.querySelectorAll('.search-type-btn').forEach(btn => { if (btn.dataset.type === type) btn.classList.add('active'); else btn.classList.remove('active'); }); displayProducts(); }
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); }
        function logout() { sessionStorage.clear(); window.location.href = 'index.html'; }

        document.getElementById('searchInput').addEventListener('input', handleSearch);
        document.getElementById('clearSearchBtn').addEventListener('click', clearSearch);
        document.querySelectorAll('.search-type-btn').forEach(btn => btn.addEventListener('click', () => setSearchType(btn.dataset.type)));
        document.getElementById('checkoutBtn').addEventListener('click', openPaymentModal);
        document.getElementById('confirmSaleBtn').addEventListener('click', completeSale);
        document.querySelectorAll('.payment-method').forEach(btn => {
            btn.addEventListener('click', () => {
                selectedPaymentMethod = btn.dataset.method;
                document.querySelectorAll('.payment-method').forEach(m => m.classList.remove('selected'));
                btn.classList.add('selected');
                document.getElementById('bankDetails').style.display = selectedPaymentMethod === 'bank' ? 'block' : 'none';
            });
        });
        document.querySelector('.payment-method[data-method="cash"]').classList.add('selected');

        document.getElementById('userName').innerHTML = sessionStorage.getItem('userName') || 'مدير';
        if (!sessionStorage.getItem('loggedIn')) window.location.href = 'index.html';
        loadProducts();
    </script>
</body>
</html>
