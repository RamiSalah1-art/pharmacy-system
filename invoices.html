    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Cairo', sans-serif;
            background: #f0f2f5;
            height: 100vh;
            overflow: hidden;
        }
        .app-container { display: flex; height: 100vh; }
        .sidebar {
            width: 260px;
            background: white;
            box-shadow: 2px 0 10px rgba(0,0,0,0.1);
            height: 100%;
            overflow-y: auto;
        }
        .sidebar-header { padding: 20px; text-align: center; border-bottom: 1px solid #e0e0e0; }
        .sidebar-header i { font-size: 40px; color: #2c7da0; }
        .sidebar-nav a {
            display: flex;
            align-items: center;
            padding: 12px 20px;
            color: #2c3e50;
            text-decoration: none;
        }
        .sidebar-nav a:hover, .sidebar-nav a.active {
            background: linear-gradient(90deg, #2c7da0, #61a5c2);
            color: white;
        }
        .sidebar-nav i { width: 24px; margin-left: 10px; }
        .sidebar-footer {
            padding: 20px;
            border-top: 1px solid #e0e0e0;
            position: absolute;
            bottom: 0;
            width: 260px;
        }
        .logout-btn {
            width: 100%;
            padding: 10px;
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .top-bar {
            background: white;
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .menu-toggle {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            display: none;
        }
        .content-wrapper {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }
        .filters-bar {
            background: white;
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }
        .filters-bar input {
            flex: 2;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-family: 'Cairo', sans-serif;
        }
        .filters-bar select {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-family: 'Cairo', sans-serif;
        }
        .btn-clear {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
        }
        .btn-primary {
            background: #2c7da0;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }
        .invoice-card {
            background: white;
            border-radius: 12px;
            margin-bottom: 15px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .invoice-header {
            background: #2c7da0;
            color: white;
            padding: 15px 20px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
        }
        .invoice-content { display: none; padding: 20px; }
        .invoice-content.show { display: block; }
        .detail-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 15px;
        }
        .items-table { overflow-x: auto; }
        .items-table table { width: 100%; border-collapse: collapse; }
        .items-table th, .items-table td { padding: 10px; text-align: right; border-bottom: 1px solid #eee; }
        .invoice-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #eee;
        }
        .btn-edit {
            background: #f39c12;
            color: white;
            border: none;
            padding: 5px 15px;
            border-radius: 5px;
            cursor: pointer;
            margin-left: 8px;
        }
        .btn-delete {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 5px 15px;
            border-radius: 5px;
            cursor: pointer;
            margin-left: 8px;
        }
        .btn-print {
            background: #27ae60;
            color: white;
            border: none;
            padding: 5px 15px;
            border-radius: 5px;
            cursor: pointer;
        }
        .empty-state {
            text-align: center;
            padding: 60px;
            background: white;
            border-radius: 12px;
        }
        @media print {
            .sidebar, .top-bar, .filters-bar, .btn-primary, .btn-edit, .btn-delete, .btn-print, .invoice-header, .menu-toggle {
                display: none !important;
            }
            .invoice-content {
                display: block !important;
                padding: 0 !important;
            }
            .invoice-card {
                box-shadow: none !important;
                margin: 0 !important;
            }
            body {
                background: white !important;
                padding: 20px !important;
            }
        }
        @media (max-width: 768px) {
            .sidebar { position: fixed; transform: translateX(-100%); transition: 0.3s; }
            .sidebar.active { transform: translateX(0); }
            .menu-toggle { display: block; }
            .main-content { margin-right: 0; }
            .detail-row { grid-template-columns: repeat(2, 1fr); }
            .filters-bar { flex-direction: column; }
            .filters-bar input, .filters-bar select, .btn-clear { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <img id="sidebarLogo" src="" alt="الشعار" style="max-width: 50px; max-height: 50px; display: none; margin-bottom: 5px;">
                <i class="fas fa-hospital-user"></i>
                <h3 id="pharmacyNameHeader">نظام الصيدلية</h3>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html"><i class="fas fa-chart-line"></i> لوحة التحكم</a>
                <a href="inventory.html"><i class="fas fa-boxes"></i> المخزون</a>
                <a href="pos.html"><i class="fas fa-cash-register"></i> نقطة البيع</a>
                <a href="customers.html"><i class="fas fa-users"></i> العملاء</a>
                <a href="invoices.html" class="active"><i class="fas fa-file-invoice"></i> الفواتير</a>
                <a href="reports.html"><i class="fas fa-chart-bar"></i> التقارير</a>
                <a href="settings.html"><i class="fas fa-cog"></i> الإعدادات</a>
            </nav>
            <div class="sidebar-footer"><button onclick="logout()" class="logout-btn">تسجيل الخروج</button></div>
        </aside>
        <main class="main-content">
            <header class="top-bar">
                <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
                <div><span id="userName"></span> <i class="fas fa-user-circle"></i></div>
            </header>
            <div class="content-wrapper">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <h1>📄 الفواتير</h1>
                    <a href="pos.html" class="btn-primary"><i class="fas fa-plus"></i> فاتورة جديدة</a>
                </div>
                
                <div class="filters-bar">
                    <input type="text" id="searchInput" placeholder="بحث برقم الفاتورة أو اسم العميل">
                    <select id="paymentFilter">
                        <option value="all">جميع طرق الدفع</option>
                        <option value="نقدي">نقدي</option>
                        <option value="تحويل بنكي">تحويل بنكي</option>
                    </select>
                    <button class="btn-clear" id="clearFiltersBtn"><i class="fas fa-eraser"></i> مسح الفلاتر</button>
                </div>
                
                <div id="invoicesList"></div>
            </div>
        </main>
    </div>

    <script>
        let allInvoices = [];
        let currentPharmacyId = null;
        
        function loadCompanyData() {
            const savedLogo = localStorage.getItem('pharmacyLogo');
            if (savedLogo) {
                const sidebarLogo = document.getElementById('sidebarLogo');
                if (sidebarLogo) {
                    sidebarLogo.src = savedLogo;
                    sidebarLogo.style.display = 'block';
                }
            }
            const settings = JSON.parse(localStorage.getItem('pharmacySettings') || '{}');
            if (settings.pharmacyName) {
                document.getElementById('pharmacyNameHeader').innerHTML = settings.pharmacyName;
            }
        }
        
        function getCompanyData() {
            const savedData = localStorage.getItem('companyData');
            if (savedData) {
                return JSON.parse(savedData);
            }
            return {
                pharmacyName: '',
                commercialRegister: '',
                taxNumber: '',
                phone: '',
                email: '',
                address: '',
                website: ''
            };
        }
        
        function formatQRText() {
            const data = getCompanyData();
            let parts = [];
            if (data.pharmacyName) parts.push(data.pharmacyName);
            if (data.phone) parts.push(`هاتف:${data.phone}`);
            if (data.address) parts.push(data.address);
            if (data.commercialRegister) parts.push(`سجل:${data.commercialRegister}`);
            if (data.taxNumber) parts.push(`ضريبي:${data.taxNumber}`);
            if (parts.length === 0) return 'بيانات الصيدلية';
            return parts.join(' | ');
        }
        
        // تحميل الفواتير من Firebase
        async function loadInvoices() {
            const user = firebase.auth().currentUser;
            if (!user) return;
            currentPharmacyId = user.uid;
            
            const invoicesRef = firebase.firestore().collection('pharmacies').doc(currentPharmacyId).collection('invoices');
            const snapshot = await invoicesRef.get();
            allInvoices = [];
            snapshot.forEach(doc => {
                allInvoices.push({ id: doc.id, ...doc.data() });
            });
            displayInvoices(allInvoices);
            loadCompanyData();
        }
        
        function displayInvoices(invoices) {
            const container = document.getElementById('invoicesList');
            if (!invoices || invoices.length === 0) {
                container.innerHTML = '<div class="empty-state"><i class="fas fa-receipt"></i><h3>لا توجد فواتير</h3><p>قم بإجراء عملية بيع جديدة</p></div>';
                return;
            }
            
            let html = '';
            for (let i = 0; i < invoices.length; i++) {
                const inv = invoices[i];
                const date = new Date(inv.date);
                const formattedDate = `${date.getFullYear()}-${(date.getMonth()+1).toString().padStart(2,'0')}-${date.getDate().toString().padStart(2,'0')}`;
                html += `
                    <div class="invoice-card" data-id="${inv.id}">
                        <div class="invoice-header" onclick="toggleInvoice(${i})">
                            <div><strong>${inv.number || '-'}</strong><br><small>${formattedDate}</small></div>
                            <div><strong>${(inv.total || 0).toFixed(2)} ج.س</strong> <i class="fas fa-chevron-down"></i></div>
                        </div>
                        <div class="invoice-content" id="invoice-content-${i}">
                            <div class="detail-row">
                                <div><strong>العميل:</strong> ${inv.customerName || 'نقدي'}</div>
                                <div><strong>طريقة الدفع:</strong> ${inv.paymentMethod || 'نقدي'}</div>
                                <div><strong>رقم الفاتورة:</strong> ${inv.number || '-'}</div>
                                <div><strong>التاريخ:</strong> ${formattedDate}</div>
                            </div>
                            <div class="items-table">
                                <h4>المنتجات</h4>
                                <table>
                                    <thead><tr><th>المنتج</th><th>الكمية</th><th>السعر</th><th>الإجمالي</th></tr></thead>
                                    <tbody>
                                        ${inv.items && inv.items.length > 0 ? inv.items.map(item => `
                                        <tr>
                                            <td>${item.name}</td>
                                            <td>${item.quantity}<td>
                                            <td>${item.price.toFixed(2)} ج.س</td>
                                            <td>${(item.price * item.quantity).toFixed(2)} ج.س</td>
                                        </tr>`).join('') : '<tr><td colspan="4">لا توجد تفاصيل</td>｜｜DSML｜｜'}
                                    </tbody>
                                </table>
                            </div>
                            <div class="invoice-footer">
                                <div><strong>الإجمالي: ${(inv.total || 0).toFixed(2)} ج.س</strong></div>
                                <div>
                                    <button class="btn-edit" onclick="event.stopPropagation(); editInvoice(${i})"><i class="fas fa-edit"></i> تعديل</button>
                                    <button class="btn-delete" onclick="event.stopPropagation(); deleteInvoice(${i})"><i class="fas fa-trash"></i> حذف</button>
                                    <button class="btn-print" onclick="event.stopPropagation(); printInvoice(${i})"><i class="fas fa-print"></i> طباعة</button>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }
            container.innerHTML = html;
        }
        
        function toggleInvoice(index) {
            const content = document.getElementById(`invoice-content-${index}`);
            if (content) content.classList.toggle('show');
        }
        
        async function editInvoice(index) {
            const inv = allInvoices[index];
            if (!inv) return;
            const newCustomer = prompt('تعديل اسم العميل:', inv.customerName);
            if (newCustomer !== null) inv.customerName = newCustomer || 'نقدي';
            const newNotes = prompt('تعديل الملاحظات:', inv.notes || '');
            if (newNotes !== null) inv.notes = newNotes;
            
            const invoicesRef = firebase.firestore().collection('pharmacies').doc(currentPharmacyId).collection('invoices');
            await invoicesRef.doc(inv.id).update({
                customerName: inv.customerName,
                notes: inv.notes
            });
            await loadInvoices();
            alert('✅ تم تعديل الفاتورة بنجاح');
        }
        
        async function deleteInvoice(index) {
            if (!confirm('⚠️ هل أنت متأكد من حذف هذه الفاتورة؟\nلا يمكن استرجاعها بعد الحذف.')) return;
            const invoice = allInvoices[index];
            const invoiceNumber = invoice ? invoice.number : 'الفاتورة';
            
            const invoicesRef = firebase.firestore().collection('pharmacies').doc(currentPharmacyId).collection('invoices');
            await invoicesRef.doc(invoice.id).delete();
            await loadInvoices();
            alert(`✅ تم حذف ${invoiceNumber} بنجاح`);
        }
        
        function printInvoice(index) {
            const inv = allInvoices[index];
            if (!inv) return;
            
            const companyData = getCompanyData();
            const savedLogo = localStorage.getItem('pharmacyLogo');
            const settings = JSON.parse(localStorage.getItem('pharmacySettings') || '{}');
            const currencySymbol = settings.currencySymbol || 'ج.س';
            const date = new Date(inv.date);
            const formattedDate = `${date.getFullYear()}-${(date.getMonth()+1).toString().padStart(2,'0')}-${date.getDate().toString().padStart(2,'0')} ${date.getHours().toString().padStart(2,'0')}:${date.getMinutes().toString().padStart(2,'0')}`;
            
            let logoHtml = '';
            if (savedLogo) {
                logoHtml = `<img src="${savedLogo}" style="max-width: 120px; max-height: 80px; margin-bottom: 10px;">`;
            }
            
            let companyInfoHtml = '';
            if (companyData.pharmacyName) companyInfoHtml += `<div><strong>${companyData.pharmacyName}</strong></div>`;
            if (companyData.commercialRegister) companyInfoHtml += `<div>سجل تجاري: ${companyData.commercialRegister}</div>`;
            if (companyData.taxNumber) companyInfoHtml += `<div>رقم ضريبي: ${companyData.taxNumber}</div>`;
            if (companyData.phone) companyInfoHtml += `<div>${companyData.phone}</div>`;
            if (companyData.address) companyInfoHtml += `<div>${companyData.address}</div>`;
            
            const qrTextShort = formatQRText();
            
            const win = window.open('', '_blank');
            win.document.write(`
                <html dir="rtl">
                <head>
                    <title>فاتورة ${inv.number}</title>
                    <meta charset="UTF-8">
                    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"><\/script>
                    <style>
                        body {
                            font-family: 'Cairo', sans-serif;
                            padding: 20px;
                            max-width: 800px;
                            margin: 0 auto;
                        }
                        .header {
                            text-align: center;
                            border-bottom: 2px solid #2c7da0;
                            padding-bottom: 15px;
                            margin-bottom: 20px;
                        }
                        .company-info {
                            font-size: 12px;
                            color: #555;
                            margin-top: 5px;
                            line-height: 1.5;
                        }
                        .invoice-title {
                            font-size: 18px;
                            font-weight: bold;
                            margin: 10px 0;
                        }
                        .info-row {
                            display: flex;
                            justify-content: space-between;
                            margin-bottom: 10px;
                            flex-wrap: wrap;
                        }
                        table {
                            width: 100%;
                            border-collapse: collapse;
                            margin-top: 15px;
                        }
                        th, td {
                            border: 1px solid #ddd;
                            padding: 8px;
                            text-align: right;
                        }
                        th {
                            background: #f5f5f5;
                        }
                        .total {
                            margin-top: 20px;
                            text-align: left;
                            font-weight: bold;
                            font-size: 16px;
                        }
                        .footer {
                            margin-top: 30px;
                            padding-top: 15px;
                            border-top: 1px solid #ddd;
                            text-align: center;
                            font-size: 12px;
                            color: #777;
                        }
                        .qr-code-section {
                            display: flex;
                            justify-content: center;
                            margin-top: 20px;
                        }
                        .invoice-container {
                            border: 1px solid #e0e0e0;
                            padding: 20px;
                            border-radius: 10px;
                        }
                    </style>
                </head>
                <body>
                    <div class="invoice-container">
                        <div class="header">
                            ${logoHtml}
                            <div class="company-info">${companyInfoHtml}</div>
                            <div class="invoice-title">فاتورة شراء</div>
                        </div>
                        
                        <div class="info-row">
                            <div><strong>رقم الفاتورة:</strong> ${inv.number}</div>
                            <div><strong>التاريخ:</strong> ${formattedDate}</div>
                        </div>
                        <div class="info-row">
                            <div><strong>العميل:</strong> ${inv.customerName || 'نقدي'}</div>
                            <div><strong>طريقة الدفع:</strong> ${inv.paymentMethod || 'نقدي'}</div>
                        </div>
                        
                        <table>
                            <thead>
                                <tr><th>المنتج</th><th>الكمية</th><th>السعر</th><th>الإجمالي</th></tr>
                            </thead>
                            <tbody>
                                ${inv.items && inv.items.length > 0 ? inv.items.map(item => `
                                <tr>
                                    <td>${item.name}</td>
                                    <td>${item.quantity}</td>
                                    <td>${item.price.toFixed(2)} ${currencySymbol}</td>
                                    <td>${(item.price * item.quantity).toFixed(2)} ${currencySymbol}</td>
                                </tr>`).join('') : '<tr><td colspan="4">لا توجد تفاصيل</td></tr>'}
                            </tbody>
                        </table>
                        
                        <div class="total">الإجمالي: ${(inv.total || 0).toFixed(2)} ${currencySymbol}</div>
                        
                        <div class="qr-code-section" id="printQRCode"></div>
                        
                        <div class="footer">
                            ${companyData.pharmacyName || 'نظام الصيدليات'} - شكراً لثقتكم
                        </div>
                    </div>
                    <script>
                        setTimeout(() => {
                            const qrText = ${JSON.stringify(qrTextShort)};
                            const qrContainer = document.getElementById('printQRCode');
                            if (qrContainer && qrText && qrText !== 'بيانات الصيدلية') {
                                try {
                                    new QRCode(qrContainer, {
                                        text: qrText,
                                        width: 120,
                                        height: 120,
                                        colorDark: "#000000",
                                        colorLight: "#ffffff",
                                        correctLevel: QRCode.CorrectLevel.M
                                    });
                                } catch(e) {
                                    qrContainer.innerHTML = '<p style="font-size:12px;color:gray;">خطأ</p>';
                                }
                            } else if (qrContainer) {
                                qrContainer.innerHTML = '<p style="font-size:12px;color:gray;">${companyData.pharmacyName || 'بيانات الصيدلية'}</p>';
                            }
                        }, 100);
                    <\/script>
                </body>
                </html>
            `);
            win.document.close();
            setTimeout(() => { win.print(); }, 200);
        }
        
        function applyFilters() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const method = document.getElementById('paymentFilter').value;
            let filtered = allInvoices.filter(inv => {
                let match = true;
                if (search) {
                    if (!inv.number?.toLowerCase().includes(search) && !inv.customerName?.toLowerCase().includes(search)) match = false;
                }
                if (method !== 'all' && inv.paymentMethod !== method) match = false;
                return match;
            });
            displayInvoices(filtered);
        }
        
        function clearFilters() {
            document.getElementById('searchInput').value = '';
            document.getElementById('paymentFilter').value = 'all';
            displayInvoices(allInvoices);
        }
        
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); }
        function logout() { sessionStorage.clear(); window.location.href = 'index.html'; }
        
        document.getElementById('searchInput').addEventListener('input', applyFilters);
        document.getElementById('paymentFilter').addEventListener('change', applyFilters);
        document.getElementById('clearFiltersBtn').addEventListener('click', clearFilters);
        
        document.getElementById('userName').innerHTML = sessionStorage.getItem('userName') || 'مدير النظام';
        if (!sessionStorage.getItem('loggedIn')) window.location.href = 'index.html';
        
        firebase.auth().onAuthStateChanged((user) => {
            if (user) {
                loadInvoices();
            } else {
