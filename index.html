<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام إدارة الصيدليات - تسجيل الدخول</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <i class="fas fa-hospital-user logo-icon"></i>
                <h1>نظام إدارة الصيدليات</h1>
                <p>Pharmacy Management System</p>
            </div>
            <div class="language-switcher">
                <button class="lang-btn active">🇸🇦 العربية</button>
                <button class="lang-btn">🇬🇧 English</button>
            </div>
            <form onsubmit="handleLogin(event)">
                <div class="input-group">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="email" value="demo@pharmacy.com" placeholder="البريد الإلكتروني" required>
                </div>
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" value="demo123" placeholder="كلمة المرور" required>
                </div>
                <button type="submit" class="btn-login">
                    <i class="fas fa-sign-in-alt"></i> تسجيل الدخول
                </button>
            </form>
            <div style="margin-top: 20px; text-align: center; font-size: 12px; color: #95a5a6;">
                <i class="fas fa-flask"></i> نسخة المطور - تعمل بدون إنترنت
            </div>
        </div>
    </div>
    <script>
        function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            if (email === 'demo@pharmacy.com' && password === 'demo123') {
                sessionStorage.setItem('loggedIn', 'true');
                sessionStorage.setItem('userName', 'مدير النظام');
                window.location.href = 'dashboard.html';
            } else {
                alert('بيانات الدخول غير صحيحة');
            }
        }
    </script>
</body>
</html>
